[env]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    vshymanskyy/TinyGSM@^0.11.7
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit BusIO@^1.14.1

build_flags =
    -DBOARD_ESP
    -DTINY_GSM_MODEM_SIM800
    -DTINY_GSM_RX_BUFFER=1024

; NOTE: PlatformIO does not natively support flashing A9G pudding boards.
; This project can still hold A9G-specific source in src/a9g/, but
; only BOARD_ESP builds are valid through PlatformIO.
